---
version: '3.9'

services:

  nginx:
    image: nginx:latest
    deploy:
      endpoint_mode: dnsrr
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik
        - traefik.docker.lbswarm=true
        - traefik.http.services.isps-nginx.loadbalancer.server.port=80
        - traefik.http.routers.isps-nginx.entryPoints=web
        - traefik.http.routers.isps-nginx.rule=Host(`isps.liodie.fr`)
        - traefik.http.routers.isps-nginx-https.entrypoints=websecure
        - traefik.http.routers.isps-nginx-https.rule=Host(`isps.liodie.fr`)
        - traefik.http.routers.isps-nginx-https.tls.certresolver=letsencrypt
      placement:
        constraints:
          - node.labels.isps == active
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - public_build:/var/www/app/public/build:ro
      - public_bundles:/var/www/app/public/bundles:ro
    networks:
      fastcgi: ~
      reverse-proxy: ~

  php:
    image: gitlab-registry.idci-consulting.fr/liodie/icecast-status-periodic-skimmer/php-fpm:latest-alpine-arm64
    configs:
      - source: php_conf
        target: /usr/local/etc/php/php.ini
    volumes:
      - public_build:/var/www/app/public/build
      - public_bundles:/var/www/app/public/bundles
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-uRee4iehie4ahtei2eengequ}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-isps}
      DATABASE_USER: ${POSTGRES_USER:-root}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-toor}
      DATABASE_VERSION: ${POSTGRES_VERSION:-17}
    deploy:
      endpoint_mode: vip
      placement:
        constraints:
          - node.labels.isps == active
    networks:
      fastcgi: ~
      db: ~

  cron:
    image: gitlab-registry.idci-consulting.fr/liodie/icecast-status-periodic-skimmer/cron:latest-alpine-arm64
    configs:
      - source: php_conf
        target: /usr/local/etc/php/php.ini
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-uRee4iehie4ahtei2eengequ}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-isps}
      DATABASE_USER: ${POSTGRES_USER:-root}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-toor}
      DATABASE_VERSION: ${POSTGRES_VERSION:-17}
    deploy:
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.isps == active
    networks:
      db: ~

  postgres:
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toor}
      POSTGRES_USER: ${POSTGRES_USER:-root}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    deploy:
      endpoint_mode: vip
      placement:
        constraints:
          - node.labels.isps == active
    networks:
      db: ~

configs:
  php_conf:
    file: ./php/php.ini
  nginx_conf:
    file: ./nginx/nginx.conf

volumes:
  public_build: ~
  public_bundles: ~
  postgres_data: ~

networks:
  db: ~
  fastcgi: ~
  reverse-proxy:
    external: true
    name: haproxy_ingress # Change this value to 'traefik' when Traefik is used as reverse proxy instead of Haproxy

